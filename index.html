let userXP=(function(){try{const v=parseFloat(localStorage.getItem('bc_xp'));return isNaN(v)?10.6:v;}catch(e){return 10.6;}})();
function loyFlat(){const f=[];LTIERS.forEach((tr,ti)=>tr.lv.forEach(l=>f.push({tier:tr.name,ti:ti,lvl:l[0],xp:l[1],bonus:l[2]})));return f;}
function loyStatus(){const f=loyFlat();let cur=f[0],idx=0;for(let i=0;i<f.length;i++){if(userXP>=f[i].xp){cur=f[i];idx=i;}}const next=f[idx+1]||null;return{xp:userXP,cur:cur,next:next,idx:idx,left:next?(next.xp-userXP):0};}
function fmtN(n){return Number(n).toLocaleString('en-US');}
function fmtXP(n){return (Math.round(n*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});}

      <div class="body">
        <div class="loyhdr"><span>Level</span><span>Required XP</span><span>Level Up (CIC)</span></div>
        ${tr.lv.map(l=>{const on=(s.cur.tier===tr.name&&s.cur.lvl===l[0]);return `<div class="loyrow${on?' on':''}"><span>${l[0]}</span><span>${fmtN(l[1])}</span><span>+${fmtN(l[2])}</span></div>`;}).join('')}

function trHTML(html){if(lang==="ru")return html;if(!trHTML._k)trHTML._k=Object.keys(TR).sort(function(a,b){return b.length-a.length;});for(var i=0;i<trHTML._k.length;i++){var k=trHTML._k[i];if(html.indexOf(k)>=0){var v=(TR[k]&&(TR[k][lang]||TR[k].en))||k;html=html.split(k).join(v);}}return html;}
const PAGES={home,products,live,market,partner,affiliate,partners,more,register,chat,igaming,platforms,catalog,bme,regional,payment,loyalty};
const NAV=[['live','broadcast',2],['market','store',3],['partners','users',4],['more','dots',5]];
function renderNav(){$('#nav').innerHTML=NAV.map(n=>`<div class="${cur===n[0]?'on':''}" data-t="${n[0]}">${ic(n[1])}${t('nav')[n[2]]}</div>`).join('');}
function render(pg){cur=pg;
  const fab=$('#fab'),tb=$('#topbar'),bb=$('#botbar');
  if(pg==='entry'){$('#nav').style.display='none';tb.style.display='none';bb.style.display='none';fab.style.display='none';$('#scroll').innerHTML=trHTML(entry());$('#scroll').scrollTop=0;return;}
  tb.style.display='block';bb.style.display='flex';$('#nav').style.display='flex';fab.style.display=pg==='chat'?'none':'flex';
  renderTop();renderBot();
  if(pg==='advise'){advise();$('#scroll').scrollTop=0;return;}
  $('#scroll').innerHTML=trHTML(PAGES[pg]());$('#scroll').scrollTop=0;renderNav();}
function go(pg){track('page',pg);render(pg);}
$('#nav').addEventListener('click',e=>{const d=e.target.closest('[data-t]');if(d)go(d.dataset.t);});
$('#fab').innerHTML=ic('message');
(function(){try{const g=JSON.parse(localStorage.getItem('bc_guest')||'null');if(g&&g.name){window.USER=g.name;render('home');return;}}catch(e){}render('entry');})();
