<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>BetConstructAI — App</title>
<style>

  .vtitle{font-size:16px;font-weight:700}
  .vsub{font-size:12px;color:var(--muted);margin-top:2px}
  .vst.on{color:var(--green);font-weight:700}.vst.cn{color:#c8860a;font-weight:700}.vst.off{color:var(--muted)}
  .vpncard.act{border-color:#b7e6d3}
  .vserver{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-top:8px;padding:12px 14px;

  .vserver svg{font-size:19px;color:var(--mag)}.vserver .ch{margin-left:auto;color:var(--blue);font-size:13px;font-weight:700}
  .search{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:12px;
    color:var(--muted);font-size:16px;display:flex;align-items:center;gap:10px;cursor:pointer}
  .search svg{font-size:21px}
  .aicard{background:var(--mag);color:#fff;border-radius:16px;padding:18px;margin-top:14px;display:flex;
    align-items:center;justify-content:space-between;cursor:pointer}
  .aicard .t{font-size:19px;font-weight:800;display:flex;align-items:center;gap:9px}
  .aicard .t svg{font-size:22px}
  .aicard .chev{font-size:22px}
  .h2{font-size:20px;font-weight:800;margin:22px 18px 12px;display:flex;justify-content:space-between;align-items:center}
  .h2 .lft{display:flex;align-items:center;gap:8px}.h2 .lft svg{color:var(--live);font-size:14px}
  .h2 a{font-size:14px;color:var(--blue);font-weight:600;text-decoration:none;cursor:pointer}
  .qa{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;padding:0 16px}
  .qtile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 4px 12px;text-align:center;cursor:pointer}
  .qtile svg{font-size:28px;color:var(--mag)}.qtile p{margin:8px 0 0;font-size:12.5px;font-weight:700}
  .qtile:active{background:#faf2f6}
  .lscroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
  .lscroll::-webkit-scrollbar{display:none}
  .lmatch{min-width:258px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer}
  .lmatch .lg2{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:7px}
  .lmatch .lg2 svg{color:var(--live);font-size:12px}
  .lmatch .bot{display:flex;justify-content:space-between;align-items:center;margin-top:26px}
  .lmatch .sc{color:var(--green);font-weight:800;font-size:16px}
  .lmatch .od{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 18px;color:var(--muted);font-weight:700}

  .promo .d{font-size:14px;opacity:.9;margin-top:3px}
  .list2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
  .lcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 14px;display:flex;
    align-items:center;gap:11px;font-size:15px;font-weight:700;cursor:pointer;min-height:58px}
  .lcard svg{font-size:23px;color:var(--mag)}
  .lcard:active{background:#faf2f6}
  .page{padding:16px}.page h2{font-size:22px;margin:4px 0 2px;display:flex;align-items:center;gap:9px}
  .page h2 svg{font-size:22px;color:var(--mag)}
  .page .sub{color:var(--muted);font-size:14px;margin:0 0 16px}
  .back{display:inline-flex;align-items:center;gap:5px;color:var(--mag);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px}
  .back svg{font-size:18px}
  .pcat{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .pcat .hd{padding:15px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .pcat .hd .l{display:flex;align-items:center;gap:11px;font-size:16px;font-weight:700}
  .pcat .hd .l svg{color:var(--mag);font-size:22px}
  .pcat .more{color:var(--mag);font-size:14px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .pcat .more svg{transition:.2s;font-size:16px}
  .pcat .body{display:none;border-top:1px solid var(--line)}
  .pcat.open .body{display:block}
  .pcat.open .more svg{transform:rotate(180deg)}
  .lnk{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid var(--line);
    text-decoration:none;color:var(--text);font-size:14.5px}
  .lnk:first-child{border-top:none}
  .lnk .nm{display:flex;align-items:center;gap:10px}.lnk .nm svg{font-size:20px;color:var(--mag)}
  .lnk .go{color:var(--blue);font-size:17px}
  .lnk:active{background:#faf2f6}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
  .rec .row{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:flex-start}.rec .row:last-child{border:none}
  .rec .row svg{font-size:20px;color:var(--mag)}
  .disc{font-size:12px;color:var(--muted);background:var(--bg);border-radius:11px;padding:11px;margin-bottom:12px}
  .btn{width:100%;height:46px;border:none;border-radius:13px;background:var(--mag);color:#fff;font-weight:800;font-size:15px;
    display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-top:10px}
  .btn svg{font-size:19px}.btn:active{transform:scale(.99)}
  textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:15px;font-family:inherit;resize:none;color:var(--text)}
  .page label{display:block;font-size:12px;color:var(--muted);margin:13px 0 5px;font-weight:600}
  .page input[type=text],.page input[type=email],.page input[type=password]{width:100%;border:1px solid var(--line);
    border-radius:11px;padding:12px;font-size:15px;font-family:inherit;color:var(--text);background:var(--card)}
  .page input:focus{outline:none;border-color:var(--mag)}
  .roleg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .rolec{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;display:flex;flex-direction:column;
    gap:8px;cursor:pointer;font-size:13px;font-weight:700}
  .rolec svg{font-size:23px;color:var(--mag)}
  .rolec.on{border-color:var(--mag);background:#faf2f6}
  label.chk{display:flex;align-items:center;gap:9px;font-size:14.5px;color:var(--text);margin-top:13px;font-weight:600;cursor:pointer}
  label.chk input{width:18px;height:18px;accent-color:var(--mag)}
  .regfoot{text-align:center;color:var(--blue);font-weight:700;margin-top:16px;cursor:pointer;font-size:14px}
  .page select{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;color:var(--text);background:var(--card);-webkit-appearance:none;appearance:none}
  .page select:focus{outline:none;border-color:var(--mag)}
  .fsec{font-size:13px;font-weight:800;color:var(--mag);margin:20px 0 4px;text-transform:uppercase;letter-spacing:.4px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .chip.on{background:var(--mag);color:#fff;border-color:var(--mag)}
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px}
  .vtop{display:flex;gap:12px}
  .vlogo{width:46px;height:46px;border-radius:12px;background:#faf2f6;color:var(--mag);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .vname{font-size:16px;font-weight:700}.vcat{font-size:12.5px;color:var(--muted);margin-top:1px}
  .vbadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .vb{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
  .vb svg{font-size:13px}

  .vbot{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
  .vstat{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}.vstat svg{font-size:15px;color:var(--mag)}
  .btn2{margin-left:auto;background:var(--mag);color:#fff;border:none;border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer}
  .btn2:active{transform:scale(.98)}
  .tag1{font-size:14px;font-weight:700;color:var(--mag);margin-top:8px}
  .tag2{font-size:13px;color:var(--muted);margin-top:1px}
  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 22px;text-align:center;position:relative}
  .glang{position:absolute;top:16px;right:16px;display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .gwm{font-size:30px;font-weight:800;margin-bottom:8px}.gwm .b{color:var(--mag)}.gwm .a{color:var(--blue)}
  .gtag{font-size:16px;font-weight:700}.gtag2{font-size:13.5px;color:var(--muted);margin-bottom:24px}
  .gcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;text-align:left}
  .gcard h2{font-size:20px;margin:0 0 3px}.gsub{color:var(--muted);font-size:13px;margin:0 0 4px}
  .gcard label{display:block;font-size:12px;color:var(--muted);margin:13px 0 5px;font-weight:600}
  .gcard input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;color:var(--text);background:var(--bg)}
  .gcard input:focus{outline:none;border-color:var(--mag)}
  .nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;
    justify-content:space-around;padding:9px 0 13px}
  .nav div{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:600;cursor:pointer;white-space:nowrap}
  .nav div svg{font-size:21px}.nav div.on{color:var(--mag)}
  .toast{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 18px;
    border-radius:12px;font-size:13.5px;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:9;max-width:88%}
  .toast.show{opacity:1}
  .fab{position:absolute;right:16px;bottom:92px;width:54px;height:54px;border-radius:50%;background:var(--mag);color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(166,0,99,.4);cursor:pointer;z-index:8}
  .fab svg{font-size:26px}
  .chatbox{height:calc(100vh - 320px);min-height:240px;overflow-y:auto;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:9px}
  .cmsg{max-width:80%;padding:9px 12px;border-radius:13px;font-size:14px}
  .cmsg.b{background:var(--card);border:1px solid var(--line);align-self:flex-start}
  .cmsg.c{background:var(--mag);color:#fff;align-self:flex-end}
  .cmgr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .cmgr .av{width:42px;height:42px;border-radius:50%;background:#faf2f6;color:var(--mag);display:flex;align-items:center;justify-content:center;font-size:20px}
  .cmgr b{font-size:15px}.cmgr .on{font-size:12px;color:var(--green);font-weight:700}
</style>
</head>

  <div class="scroll" id="scroll"></div>
  <div class="fab" id="fab" onclick="go('chat')"></div>
  <div class="nav" id="nav"></div>
  <div class="toast" id="toast"></div>
</div>

    <button class="btn" onclick="runAI()">${t('getRec')}</button><div id="aiOut"></div></div>`;
  $('#scroll').scrollTop=0;
}
function runAI(){
  const q=($('#aiq')&&$('#aiq').value.trim())||'';if(!q){toast('•');return;}
  const geo=/latam|латам|brazil|бразил|mexic|мекси/i.test(q)?'LATAM':/africa|африк/i.test(q)?'Africa':/asia|азия/i.test(q)?'Asia':'Tier-1 / EU';
  const crypto=/крипт|crypto|usdt|btc/i.test(q),slots=/слот|slot|казино|casino/i.test(q);
  const rows=[['pin',`<b>${t('rRegion')}:</b> ${geo}`],['dice',`<b>${t('rProduct')}:</b> ${slots?'Casino Suite + slots':'Sportsbook + live'}`],
    ['card',`<b>${t('rPay')}:</b> ${crypto?'Crypto Gateway (USDT/BTC) + fiat':'cards + e-wallets'}`],['badge',`<b>${t('rLic')}:</b> Curaçao`],['megaphone',`<b>${t('rMkt')}:</b> CPA`]];
  $('#aiOut').innerHTML=`<div class="rec" style="margin-top:14px">${rows.map(r=>`<div class="row">${ic(r[0])}<div>${r[1]}</div></div>`).join('')}</div>
    <div class="disc">${t('disc')}</div><button class="btn" onclick="toast('✓')">${ic('message')} ${t('discuss')}</button>`;
}
/* ---------- РЕГИСТРАЦИЯ ---------- */
const REG_ROLES=[['buyer','briefcase'],['game','gamepad'],['pay','card'],['aff','megaphone']];
function fld(k,id,type){return `<label>${t(k)}</label><input id="rg_${id}" type="${type||'text'}" autocomplete="off">`;}
function regFields(){
  let extra='';
  if(regRole==='buyer') extra=fld('fInterest','interest');
  else if(regRole==='game') extra=fld('fGameType','gametype');
  else if(regRole==='pay') extra=fld('fPayMethods','methods')+`<label class="chk"><input type="checkbox" id="rg_crypto"> ${t('fCrypto')}</label>`;
  else if(regRole==='aff') extra=fld('fModel','model')+fld('fGeo','geo')+fld('fTraffic','traffic');
  const kyb=regRole!=='buyer'?`<div class="disc">${ic('shield')} ${t('kyb')}</div>`:'';
  return fld('fName','name')+fld('fCompany','company')+fld('fEmail','email','email')+fld('fPhone','phone')+fld('fCountry','country')+fld('fPass','pass','password')
    +extra+kyb+`<button class="btn" onclick="submitReg()">${ic('check')} ${t('submitReg')}</button>
    <div class="regfoot" onclick="toast('•')">${t('haveAcc')}</div>`;
}
function register(){
  return header()+`<div class="page"><div class="back" onclick="go('home')">${ic('chevL')} ${t('back')}</div>
    <h2>${ic('user')} ${t('regTitle')}</h2><p class="sub">${t('regSub')}</p>
    <div class="roleg">${REG_ROLES.map(r=>`<div class="rolec ${regRole===r[0]?'on':''}" data-r="${r[0]}" onclick="setRole('${r[0]}')">${ic(r[1])}<span>${t('role'+cap(r[0]))}</span></div>`).join('')}</div>
    <div id="regForm">${regFields()}</div></div>`;
}
function setRole(r){regRole=r;document.querySelectorAll('.rolec').forEach(c=>c.classList.toggle('on',c.dataset.r===r));document.getElementById('regForm').innerHTML=regFields();}
function submitReg(){
  const email=(document.getElementById('rg_email')||{}).value||'';
  if(!email.trim()){toast(t('fEmail'));return;}
  const role=t('role'+cap(regRole));
  document.getElementById('regForm').innerHTML=`<div class="rec"><div class="row">${ic('check')}<div><b>${role}</b><br>${t('regDone')}</div></div></div>
    <button class="btn" onclick="go('home')">${t('back')}</button>`;
}

/* ---------- ВХОД (первый экран) ---------- */
function entry(){
  return `<div class="gate">
    <div class="glang">${['ru','en','hy'].map(l=>`<span class="lg ${lang===l?'active':''}" onclick="setLang('${l}')">${l==='ru'?'РУ':l==='en'?'EN':'ՀՅ'}</span>`).join('')}</div>
    <div class="gwm"><span class="b">Bet</span>Construct<span class="a">AI</span></div>
    <div class="gtag">Leading iGaming Platform Provider</div>
    <div class="gtag2">Experience the solutions first-hand</div>
    <div class="gcard">
      <h2>${t('regTitle')}</h2><p class="gsub">${t('entrySub')}</p>
      <label>${t('entryName')}</label><input id="en_name" autocomplete="off">
      <label>${t('entryContact')}</label><input id="en_contact" autocomplete="off" placeholder="name@mail.com / +374…">
      <button class="btn" onclick="submitEntry()">${ic('check')} ${t('entryBtn')}</button>
    </div></div>`;
}
function submitEntry(){
  const n=(document.getElementById('en_name')||{}).value||'';
  const c=(document.getElementById('en_contact')||{}).value||'';
  if(!n.trim()){toast(t('entryName'));return;}
  if(!c.trim()){toast(t('entryContact'));return;}
  window.USER=n.trim();
  render('home');
}

const PAGES={home,products,live,market,partner,affiliate,partners,more,register,chat};
function renderNav(){$('#nav').innerHTML=NAV_KEY.map((k,i)=>`<div class="${cur===k?'on':''}" data-t="${k}">${ic(NAV_IC[i])}${t('nav')[i]}</div>`).join('');}
function render(pg){cur=pg;
  const fab=$('#fab');
  if(pg==='entry'){$('#nav').style.display='none';fab.style.display='none';$('#scroll').innerHTML=entry();$('#scroll').scrollTop=0;return;}
  $('#nav').style.display='flex';fab.style.display=pg==='chat'?'none':'flex';
  if(pg==='advise'){advise();return;}
  $('#scroll').innerHTML=PAGES[pg]();$('#scroll').scrollTop=0;renderNav();}
function go(pg){render(pg);}
$('#nav').addEventListener('click',e=>{const d=e.target.closest('[data-t]');if(d)go(d.dataset.t);});
$('#fab').innerHTML=ic('message');
render('entry');
</script>
</body>
</html>
