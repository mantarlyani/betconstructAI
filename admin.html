}

  <div class="card"><h3>${ic('users')} Команда (${staff.length})</h3>
    <table><thead><tr><th>Имя</th><th>Роль</th><th>Логин</th><th>Пароль</th><th>Статус</th></tr></thead><tbody>
    ${staff.map((s,i)=>`<tr><td><b>${s.name}</b></td><td><span class="pill">${s.role}</span></td>
      <td class="mono">${s.login} <span style="cursor:pointer;color:var(--blue)" onclick="copyv('${s.login}')">${ic('copy')}</span></td>
      <td class="mono">${s.pass}</td>
      <td><span style="color:${s.status==='online'?'var(--green)':'var(--muted)'};font-weight:700">${s.status==='online'?'● в сети':'○ не в сети'}</span></td></tr>`).join('')}
    </tbody></table></div>`;
}
function addStaff(){const n=($('#s_name')||{}).value||'';const r=($('#s_role')||{}).value||'Sales';
  if(!n.trim()){toast('Укажите имя');return;}
  const login=translit(n.trim());const pass=genPass();
  staff.unshift({name:n.trim(),role:r,login,pass,status:'offline'});
  render();toast('Создан: '+login+' / '+pass);}
function copyv(v){navigator.clipboard&&navigator.clipboard.writeText(v);toast('Скопировано: '+v);}

function vCrm(){
  return `<h2>CRM · процесс и ответственные</h2><p class="sub">Назначайте ответственных; каждый шаг фиксируется по времени (принял / сделал).</p>
  ${deals.map(d=>dealCard(d)).join('')}`;
}
function dealCard(d){
  const opts=staff.map(s=>`<option ${s.name===d.resp?'selected':''}>${s.name}</option>`).join('');
  const si=STAGES.indexOf(d.stage);
  return `<div class="card"><h3>${ic('crm')} ${d.id} · ${d.client}</h3>
    <div class="grid2"><div><label>Ответственный</label><select onchange="setResp('${d.id}',this.value)">${opts}</select></div>
      <div><label>Стадия: <b>${d.stage}</b></label><div class="row">
        ${si>0?`<button class="btn sec sm" onclick="moveStage('${d.id}',-1)">◀</button>`:''}
        ${si<STAGES.length-1?`<button class="btn sm" onclick="moveStage('${d.id}',1)">Следующая ▶</button>`:'<span class="st ap">'+ic('check')+' Закрыта</span>'}</div></div></div>
    <label style="margin-top:14px">История процесса</label>
    <div>${d.steps.map(s=>`<div class="step">${ic('check')}<div style="flex:1"><b>${s.n}</b> · ${s.by}</div><span class="t">${s.at}</span></div>`).join('')}</div></div>`;
}
function setResp(id,name){const d=deals.find(x=>x.id===id);d.resp=name;d.steps.push({n:'Переназначен ответственный',by:name.split(' ')[0],at:now()});render();toast('Ответственный: '+name);}
function moveStage(id,dir){const d=deals.find(x=>x.id===id);const i=STAGES.indexOf(d.stage)+dir;if(i<0||i>=STAGES.length)return;d.stage=STAGES[i];d.steps.push({n:'Стадия → '+STAGES[i],by:d.resp.split(' ')[0],at:now()});render();}

function vStats(){
  const max=Math.max(...analytics.sections.map(s=>s[1]));
  return `<h2>Аналитика посетителей</h2><p class="sub">Кто заходил, что нажимал, куда шёл. Всего посетителей: <b>${analytics.visitors}</b>, сегодня: <b>${analytics.today}</b>.</p>
  <div class="grid2">
    <div class="card"><h3>${ic('chart')} % посещаемости разделов</h3>${sectionsBars()}</div>
    <div class="card"><h3>${ic('eye')} Последние пути посетителей</h3>
      ${analytics.journeys.map(j=>`<div class="jrow"><div style="flex:1"><b>${j.u}</b><br>${j.path.map(p=>`<span class="tag">${p}</span>`).join(' ')}</div><span class="tm">${j.tm}</span></div>`).join('')}</div>
  </div>
  <div class="card"><h3>${ic('chart')} Воронка визита → лид</h3>
    ${[['Зашли',1287],['Смотрели разделы',940],['AI-советник / чат',372],['Оставили заявку',118],['Стали лидом',118]].map((f,i,arr)=>`<div class="fbar"><span style="width:170px">${f[0]}</span><span class="bar"><span style="width:${f[1]/1287*100}%"></span></span><b>${f[1]}</b></div>`).join('')}</div>`;
}

function vSales(){
  const sales=staff.filter(s=>s.role==='Sales');
  const online=sales.filter(s=>s.status==='online').length;
  const totalDeals=sales.reduce((a,s)=>a+(s.deals||0),0);
  const totalPay=sales.reduce((a,s)=>a+(s.payout||0),0);
  return `<h2>Отдел продаж</h2><p class="sub">Присутствие, сделки и выплаты по каждому менеджеру.</p>
  <div class="kpis">
    <div class="kpi"><div class="ic">${ic('users')}</div><div class="n">${online}/${sales.length}</div><div class="l">В сети сейчас</div></div>
    <div class="kpi"><div class="ic">${ic('crm')}</div><div class="n">${totalDeals}</div><div class="l">Сделок всего</div></div>
    <div class="kpi"><div class="ic">${ic('star')}</div><div class="n">€${totalPay.toLocaleString('ru-RU')}</div><div class="l">К выплате (система должна)</div></div>
  </div>
  ${sales.map(s=>salesCard(s)).join('')}`;
}
function salesCard(s){
  const dot=s.status==='online'?'<span style="color:var(--green);font-weight:700">● в сети</span>':'<span style="color:var(--muted);font-weight:700">○ не в сети</span>';
  return `<div class="card"><h3>${ic('users')} ${s.name} · <span class="pill">${s.role}</span> &nbsp; ${dot}</h3>
    <div class="kpis" style="margin-bottom:12px">
      <div class="kpi"><div class="n">${s.deals}</div><div class="l">Сделок</div></div>
      <div class="kpi"><div class="n">€${s.payout.toLocaleString('ru-RU')}</div><div class="l">К выплате</div></div>
      <div class="kpi"><div class="n">${s.conv}%</div><div class="l">Конверсия</div></div>
    </div>
    <label>Онлайн-сессии (когда был в сети)</label>
    <div>${s.sessions.map(x=>`<div class="step">${ic('clock')}<div style="flex:1"><b>${x[0]}</b></div><span class="t">${x[1]} — ${x[2]}</span></div>`).join('')}</div>
    <div class="row" style="margin-top:12px"><button class="btn sm" onclick="go('chat')">${ic('megaphone')} Чаты менеджера</button>
      <button class="btn sec sm" onclick="toast('Выплата поставлена в очередь')">Отметить выплату</button></div></div>`;
}

function vChat(){
  if(activeConvo!=null){
    const c=convos.find(x=>x.id===activeConvo);
    return `<div class="row" style="margin-bottom:10px"><button class="btn sec sm" onclick="closeConvo()">‹ Все чаты</button></div>
    <div class="card"><h3>${ic('megaphone')} ${c.visitor} ${c.online?'<span style="color:var(--green);font-weight:700;font-size:12px">● online</span>':''} · менеджер ${c.rep}</h3>
      <div class="chatbox">${c.msgs.map(m=>`<div class="msg ${m.who}"><div>${m.text}</div><div class="mt2">${m.tm}</div></div>`).join('')}</div>
      <div class="row" style="margin-top:10px"><input id="cmsg" placeholder="Ответить посетителю…" onkeydown="if(event.key==='Enter')sendMsg()"><button class="btn" onclick="sendMsg()">▶</button></div></div>`;
  }
  return `<h2>Чаты с посетителями</h2><p class="sub">Диалоги менеджеров с посетителями платформы.</p>
  ${convos.map(c=>`<div class="appc" style="cursor:pointer" onclick="openConvo(${c.id})"><div class="h"><div class="lg">${ic('megaphone')}</div>
    <div style="flex:1"><div class="nm">${c.visitor} ${c.unread?`<span class="st pend" style="margin-left:6px">${c.unread} новое</span>`:''}</div>
      <div class="mt">${c.msgs[c.msgs.length-1].text}</div></div>
    <div style="text-align:right"><div style="font-size:11.5px;color:var(--muted)">${c.msgs[c.msgs.length-1].tm}</div>
      <div style="font-size:11.5px;color:${c.online?'var(--green)':'var(--muted)'};font-weight:700">${c.online?'online':'офлайн'}</div></div></div></div>`).join('')}`;
}
function openConvo(id){activeConvo=id;const c=convos.find(x=>x.id===id);c.unread=0;render();}
function closeConvo(){activeConvo=null;render();}
function sendMsg(){const el=$('#cmsg');const t=(el.value||'').trim();if(!t)return;const c=convos.find(x=>x.id===activeConvo);
  c.msgs.push({who:'s',text:t,tm:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})});render();}

function vContent(){
  return `<h2>Контент и управление index</h2><p class="sub">Создавайте баннеры и управляйте главной страницей.</p>
  <div class="card"><h3>${ic('plus')} Новый баннер</h3>
    <div class="grid2"><div><label>Заголовок</label><input id="b_title" placeholder="Заголовок баннера"></div>
      <div><label>Подзаголовок</label><input id="b_sub" placeholder="Короткое описание"></div></div>
    <button class="btn" style="margin-top:13px" onclick="addBanner()">${ic('megaphone')} Опубликовать баннер</button></div>
  <div class="card"><h3>${ic('layout')} Баннеры на index</h3>
    ${banners.map((b,i)=>`<div class="banner ${b.active?'mag':''}"><div><b>${b.title}</b><div style="font-size:12.5px;opacity:.85">${b.sub}</div></div>
      <div class="row"><div class="sw ${b.active?'on':''}" onclick="toggleBanner(${i})"><b></b></div><button class="btn r sm" onclick="delBanner(${i})">${ic('x')}</button></div></div>`).join('')}</div>
  <div class="card"><h3>${ic('layout')} Разделы index (вкл/выкл)</h3>
    ${Object.entries({quick:'Быстрый доступ',live:'Live сейчас',promo:'Промо-баннер',sections:'Все разделы'}).map(([k,l])=>`<div class="banner"><b>${l}</b><div class="sw ${idxToggles[k]?'on':''}" onclick="toggleIdx('${k}')"><b></b></div></div>`).join('')}
    <p class="sub" style="margin-top:10px">⚠ В демо это визуальные переключатели. В проде — управляют реальными блоками index через бэкенд/конфиг.</p></div>`;
}
function addBanner(){const t=($('#b_title')||{}).value||'';const s=($('#b_sub')||{}).value||'';if(!t.trim()){toast('Заголовок пуст');return;}banners.unshift({title:t.trim(),sub:s.trim(),active:true});render();toast('Баннер опубликован');}
function toggleBanner(i){banners[i].active=!banners[i].active;render();}
function delBanner(i){banners.splice(i,1);render();toast('Баннер удалён');}
function toggleIdx(k){idxToggles[k]=!idxToggles[k];render();toast(idxToggles[k]?'Раздел включён':'Раздел выключен');}

renderTabs();render();
</script>
</body>
</html>
