<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetConstructAI — Админ-панель</title>
<style>
  :root{--mag:#A60063;--mag-dk:#7a0049;--bg:#f3f4f6;--card:#fff;--line:#e7e9ee;--text:#1d1f25;--muted:#8b909b;
    --blue:#2f6bd6;--green:#2fb877;--amber:#c8860a;--red:#e2453f;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px}
  svg.i{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex-shrink:0}
  .top{background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
  .wm{font-size:18px;font-weight:800}.wm .b{color:var(--mag)}.wm .a{color:var(--blue)}
  .chip-admin{background:#faf2f6;color:var(--mag);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700}
  .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .who b{color:var(--text)}
  .tabs{display:flex;gap:4px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--line);padding:0 12px;position:sticky;top:57px;z-index:19;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:13px 14px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
  .tab.on{color:var(--mag);border-bottom-color:var(--mag)}.tab svg{font-size:17px}
  main{max-width:1080px;margin:0 auto;padding:18px 16px 60px}
  h2{font-size:19px;margin:0 0 3px}.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px}
  .kpi .n{font-size:26px;font-weight:800}.kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi .ic{width:34px;height:34px;border-radius:9px;background:#faf2f6;color:var(--mag);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:9px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}.card h3 svg{color:var(--mag);font-size:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  label{display:block;font-size:12px;color:var(--muted);margin:11px 0 5px;font-weight:600}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;color:var(--text);background:var(--card)}
  select{-webkit-appearance:none;appearance:none}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--mag)}
  .btn{background:var(--mag);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-weight:700;font-size:13.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:active{transform:scale(.98)}.btn.sec{background:var(--card);color:var(--text);border:1px solid var(--line)}
  .btn.sm{padding:7px 11px;font-size:12.5px}.btn.g{background:var(--green)}.btn.b{background:var(--blue)}.btn.r{background:var(--red)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .appc{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:11px}
  .appc .h{display:flex;align-items:center;gap:11px}
  .appc .lg{width:42px;height:42px;border-radius:11px;background:#faf2f6;color:var(--mag);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
  .appc .nm{font-weight:700;font-size:15px}.appc .mt{font-size:12.5px;color:var(--muted);margin-top:1px}
  .appc .det{font-size:12.5px;color:var(--muted);margin-top:9px;line-height:1.6}
  .st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
  .st svg{font-size:13px}
  .st.pend{background:#fdf3dc;color:var(--amber)}.st.ap{background:#e3f6ee;color:#0f7a52}.st.pt{background:#eef0ff;color:#4a44b8}.st.rej{background:#fdecea;color:var(--red)}.st.nw{background:#fff0e0;color:#b5700d}
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
  .kcol{min-width:230px;flex:0 0 230px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:11px}
  .khd{font-weight:700;font-size:13px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
  .kn{background:var(--mag);color:#fff;border-radius:10px;font-size:11px;padding:1px 8px;font-weight:700}
  .kcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;box-shadow:0 1px 3px rgba(20,22,50,.05)}
  .kid{font-size:11px;color:var(--muted);font-weight:700}
  .kcl{font-weight:700;font-size:14px;margin:2px 0 5px}
  .kresp{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .klast{font-size:11.5px;color:var(--text);margin-top:6px}
  .krow{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
  .kbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:3px 12px;font-weight:700;cursor:pointer;color:var(--mag)}
  .kempty{color:var(--muted);font-size:12px;text-align:center;padding:10px 0}
  .mtab{width:100%;border-collapse:collapse;font-size:12.5px}
  .mtab th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;padding:6px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
  .mtab td{padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
  .mtab tr:last-child td{border-bottom:none}
  .docgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:13px;margin-top:13px}
  .doccard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .docimg{width:100%;height:130px;object-fit:cover;display:block;background:var(--bg)}
  .docfile{height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--bg);color:var(--muted);font-size:12px;text-decoration:none;padding:10px;text-align:center}
  .docfile{font-size:30px}.docfile span{font-size:11px}
  .docmeta{padding:9px 11px}
  .chatimg{max-width:210px;max-height:180px;border-radius:10px;display:block;margin-bottom:4px}
  .kprog{height:5px;background:var(--line);border-radius:4px;overflow:hidden;margin:8px 0 4px}
  .kprog span{display:block;height:100%;background:var(--mag);border-radius:4px}
  .stepper{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:4px}
  .stp{flex:1;min-width:92px;text-align:center;padding:8px 6px;border-radius:10px;background:var(--bg);border:1px solid var(--line)}
  .stp b{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;border-radius:50%;background:var(--line);color:var(--muted);font-size:12px}
  .stp span{display:block;font-size:10.5px;margin-top:5px;color:var(--muted);line-height:1.25}
  .stp.on{background:#e3f6ee;border-color:#bfe9d5}.stp.on b{background:#0f7a52;color:#fff}
  .stp.cur{background:#eef0ff;border-color:#cdd2ff}.stp.cur b{background:var(--mag);color:#fff}.stp.cur span{color:var(--text);font-weight:600}
  .flowrow{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .flowrow:last-child{border-bottom:none}
  .fchk{width:26px;height:26px;flex:0 0 26px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted)}
  .flowrow.done .fchk{background:#0f7a52;border-color:#0f7a52;color:#fff}
  .flowrow.done b{color:var(--muted);text-decoration:line-through}
  .rtag{font-size:10.5px;font-weight:700;color:#4a44b8;background:#eef0ff;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .apipe{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
  .apx{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:4px 10px;border-radius:20px}
  .apx.on{background:#eef0ff;color:#4a44b8;border-color:#cdd2ff}
  .apipe i{color:var(--muted);font-style:normal}
  .agrbody{white-space:pre-wrap;font:12.5px/1.5 ui-monospace,monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:8px;max-height:280px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:600}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:1px solid var(--line)}
  .mono{font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
  .bar{height:9px;background:#faf2f6;border-radius:20px;overflow:hidden;flex:1;margin:0 10px}.bar span{display:block;height:100%;background:var(--mag)}
  .fbar{display:flex;align-items:center;font-size:13px;margin-bottom:9px}
  .step{display:flex;gap:9px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .step:last-child{border:none}.step .t{color:var(--muted);white-space:nowrap}.step svg{color:var(--green);font-size:15px}
  .jrow{display:flex;gap:8px;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line);align-items:center}
  .jrow:last-child{border:none}.jrow .tm{color:var(--muted);white-space:nowrap;font-size:11.5px}
  .tag{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:11.5px}
  .view{display:none}.view.on{display:block}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;transition:.3s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .banner{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
  .banner.mag{background:var(--mag);color:#fff;border-color:var(--mag)}
  .sw{width:44px;height:26px;background:#cfd3db;border-radius:20px;position:relative;cursor:pointer;flex-shrink:0}
  .sw b{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
  .sw.on{background:var(--green)}.sw.on b{left:21px}
  .chatbox{height:300px;overflow-y:auto;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px;display:flex;flex-direction:column;gap:9px}
  .msg{max-width:78%;padding:9px 12px;border-radius:13px;font-size:13.5px}
  .msg.v{background:var(--card);border:1px solid var(--line);align-self:flex-start}
  .msg.s{background:var(--mag);color:#fff;align-self:flex-end}
  .msg .mt2{font-size:10.5px;opacity:.7;margin-top:3px;text-align:right}
</style>
</head>
<body>
<div class="top">
  <div class="wm"><span class="b">Bet</span>Construct<span class="a">AI</span></div>
  <span class="chip-admin">ADMIN</span>
  <div class="who"><span>Персонал</span><button class="btn sec sm" onclick="logout()">Выйти</button></div>
</div>
<div class="tabs" id="tabs"></div>
<main id="main"></main>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const $=s=>document.querySelector(s);
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>e.classList.remove('show'),2200);}
function now(){return new Date().toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
/* ---------- Supabase + auth ---------- */
const SB_URL='https://smddtvaewmmpuyvtuscb.supabase.co';
const SB_KEY='sb_publishable_oPGh3c7PEFreALuOkY6wOA_WovnaNpL';
const db=(window.supabase&&window.supabase.createClient)?window.supabase.createClient(SB_URL,SB_KEY):null;
const STAFF_ROLES=['sales','lawyer','moderator','marketing','finance','admin'];
let profileRole=null;
const ADMIN_EMAIL='mantarlyan.ilya@sofconstruct.com';
const ADMIN_PASS='Crypto123!';
function togglePass(){const el=$('#lg_pass');if(el)el.type=el.type==='password'?'text':'password';}
function kindLabel(k){return ({game:'Игра',payment:'Платёжная система',platform:'Платформа',tool:'Инструмент',license:'Лицензия',affiliate:'Аффилейт',marketing:'Маркетинг'})[k]||k;}
async function getRole(){const u=(await db.auth.getUser()).data.user;if(!u)return null;const {data}=await db.from('profiles').select('role').eq('id',u.id).single();return data?data.role:null;}
async function loadApps(){if(!db)return;const {data,error}=await db.from('applications').select('*').order('created_at',{ascending:false});if(error){toast('Чтение заявок: '+error.message);return;}if(data){apps=data.map(a=>({id:a.id,name:a.company,type:kindLabel(a.kind),cat:a.category||a.product_name||'',contact:a.email,regions:a.regions||'',desc:a.description||a.value_prop||'',raw:a,status:a.status}));render();}}
function renderLogin(){
  document.querySelector('.tabs').style.display='none';
  $('#main').innerHTML=`<div style="max-width:360px;margin:60px auto"><div class="card"><h3>${ic('shield')} Вход для персонала</h3>
    <label>Email</label><input id="lg_email" type="email" value="${ADMIN_EMAIL}">
    <label>Пароль</label>
    <div style="position:relative"><input id="lg_pass" type="password" value="${ADMIN_PASS}" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:42px">
      <span onclick="togglePass()" style="position:absolute;right:12px;top:11px;cursor:pointer;color:var(--muted);font-size:19px">${ic('eye')}</span></div>
    <button class="btn" style="margin-top:14px" onclick="doLogin()">Войти</button>
    <p class="sub" style="margin-top:12px">Вход для персонала (демо: логин/пароль вшиты).</p></div></div>`;
}
function doLogin(){const e=(($('#lg_email')||{}).value||'').trim().toLowerCase();const p=($('#lg_pass')||{}).value||'';
  if(e===ADMIN_EMAIL.toLowerCase()&&p===ADMIN_PASS){profileRole='admin';try{sessionStorage.setItem('bc_admin','1');}catch(x){}startApp();}
  else{toast('Неверный email или пароль');}
}
function logout(){try{sessionStorage.removeItem('bc_admin');}catch(x){}location.reload();}
function startApp(){document.querySelector('.tabs').style.display='flex';renderTabs();render();if(cur==='mod'||cur==='dash'){loadApps();loadVendors();}if(cur==='stats'){loadStats();loadVendors();}if(cur==='sales'||cur==='crm'||cur==='dash'){loadLeads();loadShifts();}if(cur==='dash')loadEvents();}
function boot(){let ok=false;try{ok=sessionStorage.getItem('bc_admin')==='1';}catch(x){}if(ok){startApp();}else{renderLogin();}}
const IC={
  dash:'<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>',
  shield:'<path d="M12 3l7 3v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6z"/><path d="M9 12l2 2 4-4"/>',
  users:'<circle cx="9" cy="8" r="3.2"/><path d="M3.2 20a5.8 5.8 0 0 1 11.6 0"/><path d="M15.5 5.1a3.2 3.2 0 0 1 0 6.2M17 14.4a5.8 5.8 0 0 1 3.8 5.6"/>',
  crm:'<rect x="3" y="7.5" width="18" height="11.5" rx="2.2"/><path d="M9 7.5v-2a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M3 12.5h18"/>',
  chart:'<path d="M4 19V5M4 19h16"/><rect x="7" y="11" width="3" height="5"/><rect x="12" y="8" width="3" height="8"/><rect x="17" y="13" width="3" height="3"/>',
  layout:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 9v11"/>',
  check:'<path d="M5 13l4 4L19 7"/>',x:'<path d="M6 6l12 12M18 6L6 18"/>',star:'<path d="M12 3.2l2.7 5.8 6.3.8-4.7 4.2 1.3 6.2L12 17.6 6.1 20.2l1.3-6.2L2.7 9.8l6.3-.8z" fill="currentColor" stroke="none"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',clock:'<circle cx="12" cy="12" r="8.2"/><path d="M12 7.5v4.7l3.2 2"/>',eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/>',building:'<rect x="5.5" y="3.5" width="13" height="17" rx="1.4"/><path d="M9 7.5h2M13 7.5h2M9 11h2M13 11h2M9 14.5h2M13 14.5h2"/>',
  scale:'<path d="M12 3v18M7 21h10M6 7h12M6 7l-3 6a3 3 0 0 0 6 0zM18 7l-3 6a3 3 0 0 0 6 0z"/>',pin:'<path d="M12 21s7-6 7-11a7 7 0 0 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  key:'<circle cx="8" cy="15" r="4"/><path d="M11 12l8-8M17 4l3 3M15 6l2 2"/>',megaphone:'<path d="M4 10v4l11 4.5V5.5z"/><path d="M15 8.5a3.8 3.8 0 0 1 0 7"/>'
};
function ic(n){return `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${IC[n]||''}</svg>`;}
function translit(s){const m={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'e',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',' ':'.'};return s.toLowerCase().split('').map(c=>m[c]!==undefined?m[c]:c).join('').replace(/[^a-z0-9.]/g,'');}
function genPass(){const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';let p='';for(let i=0;i<8;i++)p+=c[Math.floor(Math.random()*c.length)];return p;}

/* ---------- DATA (демо) ---------- */
let vendorsData=[], searchQueries=[], leadsData=[];
async function loadVendors(){if(!db)return;const {data}=await db.from('vendors').select('*');if(data){vendorsData=data;render();}}
async function loadLeads(){if(!db)return;const {data}=await db.from('leads').select('*').order('created_at',{ascending:false}).limit(200);if(data){leadsData=data;render();}}
let shiftsData=[], presDate=new Date().toISOString().slice(0,10);
async function loadShifts(){if(!db)return;const {data}=await db.from('shifts').select('*').order('online_at',{ascending:false}).limit(500);if(data){shiftsData=data;render();}}
async function toggleShift(name,role){
  if(!db){toast('Нет подключения к базе');return;}
  const open=shiftsData.find(s=>s.staff===name&&!s.offline_at);
  if(open){await db.from('shifts').update({offline_at:new Date().toISOString()}).eq('id',open.id);toast(name+' — выход отмечен');}
  else{await db.from('shifts').insert({staff:name,role:role||'Sales'});toast(name+' — вход отмечен');}
  loadShifts();
}
function isOnlineNow(name){return shiftsData.some(s=>s.staff===name&&!s.offline_at);}
function shiftsOn(name,d){return shiftsData.filter(s=>s.staff===name&&(s.online_at||'').slice(0,10)===d);}
function shiftMs(s){const a=new Date(s.online_at).getTime();const b=s.offline_at?new Date(s.offline_at).getTime():Date.now();return Math.max(0,b-a);}
function fmtDur(ms){const m=Math.round(ms/60000);const h=Math.floor(m/60);return (h?h+'ч ':'')+(m%60)+'м';}
function fmtT(t){return t?new Date(t).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):'сейчас';}
function setPresDate(v){presDate=v;render();}
let eventsData=[];
async function loadEvents(){if(!db)return;const {data}=await db.from('events').select('visitor_anon,session_id,type,target,meta,created_at').order('created_at',{ascending:false}).limit(400);if(data){eventsData=data;render();}}
function liveVisitors(){const cut=Date.now()-5*60000;const seen={};eventsData.forEach(e=>{const t=new Date(e.created_at).getTime();if(t>=cut){const v=e.visitor_anon||e.session_id;if(v&&!seen[v])seen[v]={id:v,last:e.target||e.type,at:e.created_at};}});return Object.keys(seen).map(k=>seen[k]);}
function journeys(){const by={};eventsData.forEach(e=>{const v=e.visitor_anon||e.session_id;if(!v)return;if(!by[v])by[v]=[];if(by[v].length<8)by[v].push(e.target||e.type);});return Object.keys(by).slice(0,8).map(v=>({v:String(v).slice(0,6),path:by[v].slice().reverse()}));}
async function loadStats(){if(!db)return;const {data}=await db.from('events').select('type,target,meta,created_at').eq('type','search').order('created_at',{ascending:false}).limit(300);if(data){const c={};data.forEach(e=>{const q=(e.meta&&e.meta.q)||e.target;if(q){c[q]=(c[q]||0)+1;}});searchQueries=Object.keys(c).map(k=>[k,c[k]]).sort((a,b)=>b[1]-a[1]).slice(0,15);render();}}

async function setStatus(id,s){const a=apps.find(x=>x.id===id);if(a)a.status=s;

  if(db){const {error}=await db.from('applications').update({status:s,reviewed_at:new Date().toISOString(),portal_active:portalActive}).eq('id',id);
    if(error){toast('Ошибка: '+error.message);}
    else if(a){
      await db.from('vendors').delete().eq('application_id',id);
      if(portalActive){const {error:ve}=await db.from('vendors').insert({application_id:id,name:a.name,category:a.cat,description:a.desc,badge:s,active:true,regions:a.regions,match_score:s==='new'?65:80});if(ve)toast('Вендор: '+ve.message);}
    }}
  toast(portalActive?((s==='approved'?'✓ Approved':s==='partner'?'★ Partner':'✦ New offer')+' · кабинет партнёра активирован'):(s==='rejected'?'Отклонён':'Возвращён на проверку'));render();}

function mktLeads(v){return leadsData.filter(l=>(l.vendor_id&&v.id&&l.vendor_id===v.id)||(l.vendor&&v.name&&l.vendor===v.name));}
function badgeRu(b){return b==='partner'?'Партнёр':b==='approved'?'Проверен':b==='new'?'New offer':(b||'—');}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function mktRows(){
  return vendorsData.map(v=>{
    const imp=v.impressions||0,clk=v.clicks||0,ls=mktLeads(v);
    const cart=ls.filter(l=>l.source==='cart').length, demo=ls.filter(l=>l.source==='demo_request').length;
    return {name:v.name||'—',cat:v.category||'—',badge:v.badge,imp,clk,ctr:pct(clk,imp),cart,demo,leads:ls.length,conv:pct(ls.length,clk)};
  }).sort((a,b)=>b.imp-a.imp||b.leads-a.leads);
}

  return `<div class="grid2">
    <div class="card"><h3>${ic('chart')} Итоги Marketplace</h3>
      <div class="fbar"><span style="flex:1">Показы</span><b>${tot.imp}</b></div>

      <div class="fbar"><span style="flex:1">Запросов демо</span><b>${tot.demo}</b></div>
      <div class="fbar"><span style="flex:1">Лидов всего (конв. ${pct(tot.leads,tot.clk)}%)</span><b>${tot.leads}</b></div></div>

function fileKind(name,mime){const n=(name||'').toLowerCase();const m=(mime||'').toLowerCase();
  if(m.startsWith('image/')||/\.(png|jpe?g|gif|webp|svg|avif)$/.test(n))return'image';
  if(m.startsWith('video/')||/\.(mp4|webm|mov|m4v)$/.test(n))return'video';
  if(m==='application/pdf'||/\.pdf$/.test(n))return'pdf';return'file';}
function fmtSize(b){b=+b||0;if(b<1024)return b+' Б';if(b<1048576)return(b/1024).toFixed(0)+' КБ';return(b/1048576).toFixed(1)+' МБ';}
async function uploadToStorage(file){
  if(!db) throw new Error('Хранилище недоступно');
  const ext=(file.name.split('.').pop()||'bin').toLowerCase();
  const path='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
  const {error}=await db.storage.from('uploads').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});
  if(error) throw error;
  const {data}=db.storage.from('uploads').getPublicUrl(path);
  return {url:data.publicUrl,kind:fileKind(file.name,file.type)};
}

      ${a.doc_url?`<a class="btn sec sm" href="${a.doc_url}" target="_blank">Открыть документ</a>`:''}
      ${a.signer_email?`<span class="sub" style="align-self:center">✉ ${a.signer_email}</span>`:''}
      <button class="btn r sm" onclick="delAgr('${a.id}')">${ic('x')}</button></div>
    ${a.status==='signed'||a.status==='completed'?`<p class="sub" style="margin-top:8px">Подписано: ${(a.signed_at||'').slice(0,16).replace('T',' ')}${a.paid_at?(' · оплата: '+(a.paid_at||'').slice(0,16).replace('T',' ')):''}</p>`:''}
  </div>`).join(''):'<div class="card"><p class="sub">Пока нет соглашений. Создайте первое выше. Если после создания пусто — проверьте, что выполнен <b>add_agreements.sql</b> в Supabase.</p></div>'}`;
}

// ============ ЗАДАЧИ / ЗАПРОСЫ РЕСУРСОВ (замена Jira) ============
let taskData=[], taskDept='';
async function loadTasks(){if(!db)return;const {data}=await db.from('tasks').select('*').order('created_at',{ascending:false}).limit(300);if(data){taskData=data;render();}}
const TDEPTS=['PM','Service Sales','Sales','Legal','Dev','Ops'];
const TPRIO={P1:'rej',P2:'nw',P3:'pt',P4:'pend'};
const TSTATUS=[['open','Открыто'],['in_progress','В работе'],['blocked','Блок'],['done','Готово']];
function tstatIdx(s){return TSTATUS.findIndex(x=>x[0]===s);}
async function createTask(){
  const g=id=>($('#'+id)&&$('#'+id).value)||'';
  const title=g('tk_title').trim();if(!title){toast('Название задачи пусто');return;}
  const row={title,description:g('tk_desc'),type:g('tk_type')||'dept_task',dept:g('tk_dept'),assignee:g('tk_assignee'),
    requester:'Админ',deal_id:g('tk_deal'),priority:g('tk_prio')||'P3',status:'open',due_date:g('tk_due')||null};
  if(db){const {error}=await db.from('tasks').insert(row);if(error){toast('Ошибка: '+error.message);return;}}
  toast('Задача создана');loadTasks();const ti=$('#tk_title');if(ti)ti.value='';const td=$('#tk_desc');if(td)td.value='';
}
async function addResourceRequest(d){
  if(!db)return;
  const rows=[
    {title:'Назначить PM на проект '+d.client,type:'resource_request',dept:'PM',requester:d.resp||'Sales',deal_id:d.id,priority:'P2',status:'open'},
    {title:'Подключить Service Sales · '+d.client,type:'resource_request',dept:'Service Sales',requester:d.resp||'Sales',deal_id:d.id,priority:'P2',status:'open'}
  ];
  await db.from('tasks').insert(rows);toast('Созданы запросы ресурсов (PM + Service Sales)');loadTasks();
}
async function moveTask(id,dir){const tk=taskData.find(x=>x.id===id);if(!tk)return;const i=tstatIdx(tk.status)+dir;if(i<0||i>=TSTATUS.length)return;if(db)await db.from('tasks').update({status:TSTATUS[i][0]}).eq('id',id);loadTasks();}
async function setTaskAssignee(id,val){if(db)await db.from('tasks').update({assignee:val}).eq('id',id);loadTasks();}
async function delTask(id){if(!db)return;if(!confirm('Удалить задачу?'))return;await db.from('tasks').delete().eq('id',id);loadTasks();}
function tkCard(tk){
  const si=tstatIdx(tk.status);
  return `<div class="kcard">
    <div class="row" style="justify-content:space-between"><span class="st ${TPRIO[tk.priority]||'pend'}" style="font-size:10px">${tk.priority||'P3'}</span>
      ${tk.type==='resource_request'?`<span class="rtag">запрос</span>`:tk.type==='bug'?`<span class="st rej" style="font-size:10px">bug</span>`:''}</div>
    <div class="kcl" style="margin-top:5px">${tk.title||'—'}</div>
    <div class="kresp">${tk.dept?`<span class="rtag">${tk.dept}</span>`:''}${tk.deal_id?` · <span style="color:var(--muted)">${tk.deal_id}</span>`:''}</div>
    <select style="margin-top:7px;font-size:12px" onchange="setTaskAssignee('${tk.id}',this.value)"><option value="">— исполнитель —</option>${staff.map(s=>`<option ${tk.assignee===s.name?'selected':''}>${s.name}</option>`).join('')}</select>
    ${tk.due_date?`<div class="klast">срок: ${tk.due_date}</div>`:''}
    <div class="krow">${si>0?`<button class="kbtn" onclick="moveTask('${tk.id}',-1)">◀</button>`:'<span></span>'}
      <button class="btn r sm" style="padding:2px 8px" onclick="delTask('${tk.id}')">${ic('x')}</button>
      ${si<TSTATUS.length-1?`<button class="kbtn" onclick="moveTask('${tk.id}',1)">▶</button>`:'<span></span>'}</div></div>`;
}
function vTasks(){
  const list=taskDept?taskData.filter(t=>t.dept===taskDept):taskData;
  const dealOpts=deals.map(d=>`<option value="${d.id}">${d.id} · ${d.client}</option>`).join('');
  return `<h2>Задачи · запросы ресурсов (Jira)</h2><p class="sub">Внутренние задачи отделов и запросы PM/Service Sales. Двигайте карточки ◀ ▶ по статусам.</p>
  <div class="card"><h3>${ic('plus')} Новая задача</h3>
    <div class="grid2">
      <div><label>Название</label><input id="tk_title" placeholder="Что нужно сделать"></div>
      <div><label>Тип</label><select id="tk_type"><option value="dept_task">Задача отдела</option><option value="resource_request">Запрос ресурса</option><option value="bug">Bug</option></select></div>
      <div><label>Отдел</label><select id="tk_dept">${TDEPTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
      <div><label>Исполнитель</label><select id="tk_assignee"><option value="">— не назначен —</option>${staff.map(s=>`<option>${s.name}</option>`).join('')}</select></div>
      <div><label>Приоритет</label><select id="tk_prio"><option>P1</option><option>P2</option><option selected>P3</option><option>P4</option></select></div>
      <div><label>Срок</label><input id="tk_due" type="date"></div>
      <div><label>Сделка (необязательно)</label><select id="tk_deal"><option value="">— без привязки —</option>${dealOpts}</select></div>
      <div><label>Описание</label><input id="tk_desc" placeholder="Детали"></div>
    </div>
    <button class="btn" style="margin-top:13px" onclick="createTask()">${ic('layout')} Создать задачу</button></div>
  <div class="card"><div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <h3 style="margin:0">${ic('layout')} Доска задач (${list.length})</h3>
    <select onchange="taskDept=this.value;render()" style="max-width:200px"><option value="">Все отделы</option>${TDEPTS.map(d=>`<option ${d===taskDept?'selected':''}>${d}</option>`).join('')}</select></div>
    <div class="kanban" style="margin-top:12px">${TSTATUS.map(st=>{
      const col=list.filter(t=>t.status===st[0]);
      return `<div class="kcol"><div class="khd">${st[1]}<span class="kn">${col.length}</span></div>${col.map(tkCard).join('')||'<div class="kempty">—</div>'}</div>`;
    }).join('')}</div>
    ${!taskData.length?'<p class="sub" style="margin-top:10px">Пока нет задач. Создайте задачу выше или отметьте шаг 3 «Resource request» в сделке CRM — запросы PM/Service Sales создадутся автоматически. Если пусто после создания — проверьте <b>add_tasks.sql</b> в Supabase.</p>':''}</div>`;
}

// ============ АККАУНТЫ · чей клиент/партнёр + импорт ============
let acctData=[];
async function loadAccounts(){if(!db)return;const {data}=await db.from('accounts').select('*').order('created_at',{ascending:false}).limit(1000);if(data){acctData=data;render();}}
function normP(s){return String(s||'').replace(/[\s()\-+]/g,'').toLowerCase();}
function acctOwnerFor(l){const c=(l.contact||'').toLowerCase();const nm=(l.visitor_name||l.vendor||'').toLowerCase();
  return acctData.find(a=>(a.email&&c&&a.email.toLowerCase()===c)||(a.phone&&c&&normP(a.phone)===normP(c))||(a.name&&nm&&a.name.toLowerCase()===nm));}
function parseCSV(txt){
  const lines=String(txt||'').split(/\r?\n/).filter(l=>l.trim().length);if(!lines.length)return [];
  const split=l=>{const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){if(q&&l[i+1]==='"'){cur+='"';i++;}else q=!q;}else if((c===','||c===';'||c==='\t')&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out.map(s=>s.trim());};
  const heads=split(lines[0]).map(h=>h.toLowerCase());
  const idx=keys=>heads.findIndex(h=>keys.some(k=>h.includes(k)));
  const m={name:idx(['компан','company','name','имя','клиент','account','партн']),contact:idx(['контакт','contact','лицо']),email:idx(['email','почт','mail']),phone:idx(['телефон','phone','тел','telegram']),owner:idx(['владел','менедж','ответствен','owner','sales','менеджер','am']),kind:idx(['тип','kind','type']),stage:idx(['стад','stage','статус','status']),source:idx(['источник','source','система']),notes:idx(['примеч','note','коммент'])};
  const rows=[];
  for(let i=1;i<lines.length;i++){const c=split(lines[i]);const g=k=>m[k]>=0?(c[m[k]]||''):'';const name=g('name');if(!name)continue;
    const kraw=(g('kind')||'').toLowerCase();const kind=kraw.includes('партн')||kraw.includes('partner')?'partner':kraw.includes('лид')||kraw.includes('prospect')?'prospect':'client';
    rows.push({name,contact_name:g('contact'),email:g('email').toLowerCase(),phone:g('phone'),owner:g('owner'),kind,stage:g('stage'),source:g('source')||'import',notes:g('notes')});}
  return rows;
}
async function importAccounts(){
  if(!db){toast('База недоступна');return;}
  let txt=($('#imp_text')&&$('#imp_text').value)||'';
  const fi=$('#imp_file');
  if(fi&&fi.files&&fi.files[0]){try{txt=await fi.files[0].text();}catch(e){}}
  const rows=parseCSV(txt);
  if(!rows.length){toast('Не найдено строк. Нужен CSV с заголовками.');return;}
  toast('Импорт '+rows.length+' строк…');let ins=0,upd=0;
  for(const r of rows){
    let ex=null;
    if(r.email){const {data}=await db.from('accounts').select('id').eq('email',r.email).limit(1);if(data&&data.length)ex=data[0].id;}
    if(!ex){const {data}=await db.from('accounts').select('id').eq('name',r.name).limit(1);if(data&&data.length)ex=data[0].id;}
    if(ex){await db.from('accounts').update(r).eq('id',ex);upd++;}else{await db.from('accounts').insert(r);ins++;}
  }
  toast('Готово: +'+ins+' новых, '+upd+' обновлено');const tx=$('#imp_text');if(tx)tx.value='';loadAccounts();
}
async function createAccount(){const n=($('#ac_name')&&$('#ac_name').value)||'';if(!n.trim()){toast('Укажите компанию');return;}
  const row={name:n.trim(),kind:($('#ac_kind')&&$('#ac_kind').value)||'client',contact_name:($('#ac_contact')&&$('#ac_contact').value)||'',email:(($('#ac_email')&&$('#ac_email').value)||'').toLowerCase(),phone:($('#ac_phone')&&$('#ac_phone').value)||'',owner:($('#ac_owner')&&$('#ac_owner').value)||'',source:'manual'};
  if(db){const {error}=await db.from('accounts').insert(row);if(error){toast('Ошибка: '+error.message);return;}}toast('Аккаунт добавлен');loadAccounts();}
async function setAcctOwner(id,val){if(db)await db.from('accounts').update({owner:val}).eq('id',id);toast('Владелец: '+(val||'снят'));loadAccounts();}
async function delAccount(id){if(!db)return;if(!confirm('Удалить аккаунт?'))return;await db.from('accounts').delete().eq('id',id);loadAccounts();}
function acctOwnerSel(a){return `<select onchange="setAcctOwner('${a.id}',this.value)"><option value="">— не назначен —</option>${staff.map(s=>`<option ${a.owner===s.name?'selected':''}>${s.name}</option>`).join('')}</select>`;}
function vAccounts(){
  const cl=acctData.filter(a=>a.kind!=='partner'&&a.kind!=='prospect').length,pt=acctData.filter(a=>a.kind==='partner').length,noOwner=acctData.filter(a=>!a.owner).length;
  return `<h2>Аккаунты · чей клиент / партнёр</h2><p class="sub">Единый реестр клиентов и партнёров с закреплённым владельцем. Импортируйте выгрузку из Zoho / DocuSign / Pandayo / Hoory / Jira — и у sales не будет конфликтов «чей это клиент».</p>
  <div class="kpis">
    <div class="kpi"><div class="ic">${ic('building')}</div><div class="n">${acctData.length}</div><div class="l">Всего аккаунтов</div></div>
    <div class="kpi"><div class="ic">${ic('users')}</div><div class="n">${cl}</div><div class="l">Клиенты</div></div>
    <div class="kpi"><div class="ic">${ic('star')}</div><div class="n">${pt}</div><div class="l">Партнёры</div></div>
    <div class="kpi"><div class="ic">${ic('clock')}</div><div class="n">${noOwner}</div><div class="l">Без владельца</div></div>
  </div>
  <div class="card"><h3>${ic('plus')} Импорт из файла (CSV)</h3>
    <p class="sub">Загрузите CSV или вставьте таблицу. Колонки распознаются по заголовкам: Компания, Контакт, Email, Телефон, Владелец, Тип, Стадия, Источник, Примечание. Excel — сохраните как CSV.</p>
    <input id="imp_file" type="file" accept=".csv,text/csv,text/plain">
    <label style="margin-top:8px">…или вставьте CSV сюда</label>
    <textarea id="imp_text" rows="4" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-family:ui-monospace,monospace;font-size:12.5px" placeholder="Компания,Контакт,Email,Телефон,Владелец,Тип&#10;CryptoCasino LATAM,Иван,ivan@cc.com,+37411,Ани Петросян,client"></textarea>
    <button class="btn" style="margin-top:10px" onclick="importAccounts()">${ic('check')} Импортировать</button></div>
  <div class="card"><h3>${ic('plus')} Добавить вручную</h3>
    <div class="grid2">
      <div><label>Компания / клиент</label><input id="ac_name"></div>
      <div><label>Тип</label><select id="ac_kind"><option value="client">Клиент</option><option value="partner">Партнёр</option><option value="prospect">Лид</option></select></div>
      <div><label>Контакт</label><input id="ac_contact"></div>
      <div><label>Email</label><input id="ac_email"></div>
      <div><label>Телефон</label><input id="ac_phone"></div>
      <div><label>Владелец</label><select id="ac_owner"><option value="">— не назначен —</option>${staff.map(s=>`<option>${s.name}</option>`).join('')}</select></div>
    </div>
    <button class="btn" style="margin-top:12px" onclick="createAccount()">${ic('check')} Добавить</button></div>
  <div class="card"><h3>${ic('users')} Реестр (${acctData.length})</h3>
    <div style="overflow-x:auto"><table class="mtab"><tr><th>Компания</th><th>Тип</th><th>Контакт</th><th>Email / тел</th><th>Владелец</th><th>Источник</th><th></th></tr>
    ${acctData.length?acctData.map(a=>`<tr><td><b>${a.name||'—'}</b></td>
      <td>${a.kind==='partner'?'<span class="st pt">Партнёр</span>':a.kind==='prospect'?'<span class="st nw">Лид</span>':'<span class="st ap">Клиент</span>'}</td>
      <td>${a.contact_name||'—'}</td><td style="font-size:11px">${a.email||''}${a.phone?('<br>'+a.phone):''}</td>
      <td>${acctOwnerSel(a)}</td><td>${a.source||'—'}</td>
      <td><button class="btn r sm" onclick="delAccount('${a.id}')">${ic('x')}</button></td></tr>`).join(''):'<tr><td colspan="7" class="sub" style="padding:12px">Реестр пуст. Импортируйте файл или добавьте вручную.</td></tr>'}
    </table></div></div>`;
}

boot();
